name: Daily 주말아이 refresh

on:
  workflow_dispatch:
  schedule:
    # 07:10 KST every day.
    - cron: "10 22 * * *"

permissions:
  contents: write

concurrency:
  group: jumali-daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site from Seoul OpenAPI data
        env:
          SEOUL_OPENAPI_KEY: ${{ secrets.SEOUL_OPENAPI_KEY }}
          JUMALI_EVENT_LIMIT: "200"
          JUMALI_SITE_URL: "https://jumali-did.pages.dev"
        run: bash scripts/build.sh

      - name: Run tests
        run: python -m pytest tests -q

      - name: Commit refreshed data and site output
        run: |
          if git diff --quiet -- data public; then
            echo "No data/site changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public
          git commit -m "chore: refresh jumali event data"
          git push
